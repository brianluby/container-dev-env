# docker-compose.agent.yml — Compose override for agent volumes and environment
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.agent.yml up

services:
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
      target: ""
      args:
        INSTALL_CLAUDE_CODE: "${INSTALL_CLAUDE_CODE:-false}"
        OPENCODE_VERSION: "${OPENCODE_VERSION:-1.1.35}"
        CLAUDE_CODE_VERSION: "${CLAUDE_CODE_VERSION:-1.0.23}"
    volumes:
      # Project source code
      - ..:/workspace
      # Agent state persistence (sessions, logs, background task output)
      - agent-state:/home/dev/.local/share/agent
      # OpenCode state (auth, session history)
      - opencode-state:/home/dev/.local/share/opencode
      # OpenCode configuration
      - opencode-config:/home/dev/.config/opencode
      # Claude Code state (optional, only if installed)
      - claude-state:/home/dev/.claude
    environment:
      # API keys (injected via PRD 003 pattern)
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - GOOGLE_API_KEY
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      # Agent configuration
      - AGENT_BACKEND=${AGENT_BACKEND:-opencode}
      - AGENT_MODE=${AGENT_MODE:-manual}
      - AGENT_STATE_DIR=/home/dev/.local/share/agent
      # Headless server auth (optional)
      - OPENCODE_SERVER_PASSWORD
    ports:
      # Headless server (only active when agent --serve is running)
      - "127.0.0.1:${AGENT_SERVER_PORT:-4096}:4096"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G
          cpus: "1.0"

volumes:
  agent-state:
    name: agent-state
  opencode-state:
    name: opencode-state
  opencode-config:
    name: opencode-config
  claude-state:
    name: claude-state
