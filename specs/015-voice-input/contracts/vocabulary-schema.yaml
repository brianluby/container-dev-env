# Custom Vocabulary Schema
# File: ~/.config/voice-input/vocabulary.yaml
# Managed by: Setup script (seed), user (extend)

$schema: "http://json-schema.org/draft-07/schema#"
title: CustomVocabulary
description: Custom vocabulary for improved transcription accuracy
type: object
required:
  - version

properties:
  version:
    type: string
    const: "1"
    description: Schema version for forward compatibility

  terms:
    type: array
    maxItems: 500
    description: Vocabulary terms with spoken forms and display formatting
    items:
      type: object
      required: [term, spoken_forms, display_form, category]
      properties:
        term:
          type: string
          minLength: 1
          maxLength: 100
          description: The vocabulary term identifier
        spoken_forms:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
            maxLength: 100
          description: How the term might be spoken (at least one entry required)
        display_form:
          type: string
          minLength: 1
          maxLength: 100
          description: How the term should appear in output text
        category:
          type: string
          enum: [function_name, variable_name, technology, project_name, domain_term, custom]
          description: Classification of the term
        project:
          type: string
          default: global
          description: Project scope ("global" or specific project name)
        enabled:
          type: boolean
          default: true
          description: Whether this term is active
