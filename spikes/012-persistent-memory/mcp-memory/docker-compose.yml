services:
  mcp-memory:
    image: mcp/memory:latest
    container_name: spike-mcp-memory
    ports:
      - "8765:8765"
    volumes:
      - mcp-memory-data:/data
      - ../workspace:/workspace
    environment:
      - MCP_MEMORY_STORAGE_BACKEND=sqlite_vec
      - MCP_MEMORY_DB_PATH=/data/memory.db
      - MCP_HTTP_HOST=0.0.0.0
      - MCP_HTTP_PORT=8765
    restart: unless-stopped

volumes:
  mcp-memory-data:

