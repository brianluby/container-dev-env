name: Git Worktree Compatibility Tests

on:
  push:
    paths:
      - 'docker/entrypoint.sh'
      - 'tests/unit/test_worktree_validation.bats'
      - 'tests/integration/test_worktree_container.sh'
      - 'tests/fixtures/**'
      - '.github/workflows/worktree-tests.yml'
  pull_request:
    paths:
      - 'docker/entrypoint.sh'
      - 'tests/unit/test_worktree_validation.bats'
      - 'tests/integration/test_worktree_container.sh'
      - 'tests/fixtures/**'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install BATS
        run: |
          git clone --depth 1 --branch v1.11.0 https://github.com/bats-core/bats-core.git tests/unit/.bats-battery/bats-core
          git clone --depth 1 --branch v0.3.0 https://github.com/bats-core/bats-support.git tests/unit/.bats-battery/bats-support
          git clone --depth 1 --branch v2.1.0 https://github.com/bats-core/bats-assert.git tests/unit/.bats-battery/bats-assert

      - name: Run unit tests
        run: tests/unit/.bats-battery/bats-core/bin/bats tests/unit/test_worktree_validation.bats

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build container image
        run: docker build -t devcontainer-worktree-test docker/

      - name: Run integration tests
        run: bash tests/integration/test_worktree_container.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: 'docker/'
          severity: warning

  shellcheck-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run ShellCheck (tests)
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: 'tests/'
          severity: warning
