# Container Dev Env - CI/CD Workflow
# Multi-architecture build and test pipeline
# Spec: specs/001-container-base-image/spec.md

name: Container Build

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - 'src/**'
      - 'templates/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Makefile'
      - 'checksums.sha256'
      - '.github/workflows/container-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - 'src/**'
      - 'templates/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Makefile'
      - 'checksums.sha256'
      - '.github/workflows/container-build.yml'
  schedule:
    # Weekly rebuild on Sunday at midnight UTC for security updates
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and test on native architecture runners
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          driver: docker-container

      - name: Install cosign
        uses: sigstore/cosign-installer@fb28c2b6339dcd94da6e4cbcbc5e888961f6f8c3 # v3.9.0

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0

      - name: Validate in-scope base image digests
        run: |
          chmod +x scripts/validate-base-image-digests.sh
          ./scripts/validate-base-image-digests.sh

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image for testing
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: devcontainer:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          pull: true

      - name: Run acceptance tests
        run: |
          chmod +x scripts/test-container.sh
          ./scripts/test-container.sh devcontainer:test

      - name: Check image size
        run: |
          SIZE=$(docker image inspect devcontainer:test --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          # Fail if over 2GB (2048MB)
          if [ $SIZE_MB -gt 2048 ]; then
            echo "ERROR: Image size exceeds 2GB limit"
            exit 1
          fi
          echo "Image size is within 2GB limit"

      - name: Generate SBOM
        run: |
          syft docker:devcontainer:test --output spdx-json=sbom-${{ matrix.arch }}.spdx.json --scope all-layers

      - name: Validate SBOM coverage
        run: |
          DPKG_COUNT=$(jq '[.packages[] | select(any(.externalRefs[]?; .referenceType == "purl" and ((.referenceLocator // "") | test("pkg:deb/"))))] | length' sbom-${{ matrix.arch }}.spdx.json)
          echo "SBOM contains ${DPKG_COUNT} dpkg packages"
          if [ "${DPKG_COUNT}" -lt 80 ]; then
            echo "ERROR: SBOM coverage too low (expected > 80 dpkg packages)"
            exit 1
          fi

          # Validate key standalone components appear in SBOM (FR-006)
          MISSING=""
          for component in node uv chezmoi; do
            if ! jq -e --arg name "${component}" '.packages[] | select(.name == $name)' sbom-${{ matrix.arch }}.spdx.json >/dev/null 2>&1; then
              MISSING="${MISSING} ${component}"
            fi
          done
          if [ -n "${MISSING}" ]; then
            echo "WARNING: SBOM missing standalone components:${MISSING}"
            echo "Note: syft may catalogue these under different names — verify manually"
          fi

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom-${{ matrix.arch }}
          path: sbom-${{ matrix.arch }}.spdx.json
          retention-days: ${{ github.event_name == 'pull_request' && 7 || 90 }}

      - name: Build and push by digest
        if: github.event_name != 'pull_request'
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          pull: true

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Sign per-architecture digest
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Create multi-architecture manifest
  merge:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: build

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Install cosign
        uses: sigstore/cosign-installer@fb28c2b6339dcd94da6e4cbcbc5e888961f6f8c3 # v3.9.0

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0

      - name: Capture manifest digest
        id: manifest
        run: |
          DIGEST=$(docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} --format '{{.Manifest.Digest}}')
          echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"
          echo "Manifest digest: ${DIGEST}"

      - name: Sign multi-architecture manifest
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.manifest.outputs.digest }}

      - name: Generate SBOM for manifest
        run: |
          syft registry:${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.manifest.outputs.digest }} --output spdx-json=sbom-manifest.spdx.json --scope all-layers

      - name: Attest SBOM
        run: |
          cosign attest --yes --type spdxjson --predicate sbom-manifest.spdx.json ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.manifest.outputs.digest }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom-manifest
          path: sbom-manifest.spdx.json
          retention-days: 90
